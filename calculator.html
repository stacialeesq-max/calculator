<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --calc-bg: #1a1a2e;
            --display-bg: #16213e;
            --btn-number: #2d2d44;
            --btn-number-hover: #3d3d5c;
            --btn-operator: #e94560;
            --btn-operator-hover: #ff6b6b;
            --btn-equals: #0f3460;
            --btn-equals-hover: #1a4a8a;
            --btn-science: #1a5a4a;
            --btn-science-hover: #2a7a6a;
            --btn-memory: #4a1a5e;
            --btn-memory-hover: #6a2a7e;
            --text-color: #fff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            background: var(--bg-color);
            gap: 20px;
            padding: 20px;
        }

        .calculator {
            background: var(--calc-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .theme-toggle {
            background: var(--btn-operator);
            color: #fff;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
        }

        .memory-display {
            color: var(--btn-operator);
            font-size: 0.8rem;
            text-align: right;
            margin-bottom: 5px;
        }

        #display {
            width: 100%;
            height: 60px;
            background: var(--display-bg);
            border: none;
            border-radius: 10px;
            color: var(--text-color);
            font-size: 1.8rem;
            text-align: right;
            padding: 10px 20px;
            margin-bottom: 15px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }

        .row-label {
            color: #666;
            font-size: 0.7rem;
            padding: 3px 0;
            grid-column: span 5;
        }

        button {
            padding: 12px 6px;
            font-size: 0.95rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            color: #fff;
        }

        button:hover {
            opacity: 0.8;
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-number {
            background: var(--btn-number);
            color: var(--text-color);
        }

        .btn-number:hover {
            background: var(--btn-number-hover);
        }

        .btn-operator {
            background: var(--btn-operator);
        }

        .btn-operator:hover {
            background: var(--btn-operator-hover);
        }

        .btn-science {
            background: var(--btn-science);
        }

        .btn-science:hover {
            background: var(--btn-science-hover);
        }

        .btn-memory {
            background: var(--btn-memory);
        }

        .btn-memory:hover {
            background: var(--btn-memory-hover);
        }

        .btn-equals {
            background: var(--btn-equals);
            grid-column: span 2;
        }

        .btn-equals:hover {
            background: var(--btn-equals-hover);
        }

        .btn-clear {
            background: var(--btn-operator);
        }

        .converter {
            background: var(--calc-bg);
            border-radius: 15px;
            padding: 15px;
            margin-top: 15px;
        }

        .converter h3 {
            color: var(--text-color);
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .converter-buttons {
            display: flex;
            gap: 6px;
        }

        .converter-btn {
            background: var(--btn-science);
            color: #fff;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            flex: 1;
            font-size: 0.8rem;
        }

        .converter-result {
            background: var(--display-bg);
            color: var(--text-color);
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 0.8rem;
            text-align: center;
        }

        .history {
            background: var(--calc-bg);
            border-radius: 20px;
            padding: 20px;
            width: 220px;
            max-height: 500px;
        }

        .history h3 {
            color: var(--text-color);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--btn-operator);
        }

        .history-item {
            background: var(--display-bg);
            color: #888;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .history-result {
            color: var(--btn-operator);
            font-weight: bold;
        }

        .btn-clear-history {
            background: var(--btn-operator);
            color: #fff;
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div>
        <div class="calculator">
            <div class="top-bar">
                <button class="theme-toggle" onclick="toggleTheme()">🌙 Dark</button>
            </div>
            <div class="memory-display" id="memoryDisplay"></div>
            <input type="text" id="display" readonly>
            
            <div class="buttons">
                <!-- Memory Row -->
                <div class="row-label">MEMORY</div>
                <button type="button" class="btn-memory" onclick="memoryClear()">MC</button>
                <button type="button" class="btn-memory" onclick="memoryRecall()">MR</button>
                <button type="button" class="btn-memory" onclick="memoryAdd()">M+</button>
                <button type="button" class="btn-memory" onclick="memorySubtract()">M-</button>
                <button type="button" class="btn-clear" onclick="clearDisplay()">C</button>

                <!-- Trig Row -->
                <div class="row-label">TRIG</div>
                <button type="button" class="btn-science" onclick="applyFunction('sin')">sin</button>
                <button type="button" class="btn-science" onclick="applyFunction('cos')">cos</button>
                <button type="button" class="btn-science" onclick="applyFunction('tan')">tan</button>
                <button type="button" class="btn-science" onclick="applyFunction('log')">log</button>
                <button type="button" class="btn-science" onclick="applyFunction('sqrt')">√</button>

                <!-- Math Row -->
                <div class="row-label">MATH</div>
                <button type="button" class="btn-science" onclick="appendValue('π')">π</button>
                <button type="button" class="btn-science" onclick="appendValue('e')">e</button>
                <button type="button" class="btn-science" onclick="applyFunction('square')">x²</button>
                <button type="button" class="btn-science" onclick="applyFunction('negate')">±</button>
                <button type="button" class="btn-operator" onclick="deleteLast()">⌫</button>

                <!-- Numbers Row 1 -->
                <button type="button" class="btn-number" onclick="appendNumber('7')">7</button>
                <button type="button" class="btn-number" onclick="appendNumber('8')">8</button>
                <button type="button" class="btn-number" onclick="appendNumber('9')">9</button>
                <button type="button" class="btn-operator" onclick="appendOperator('/')">÷</button>
                <button type="button" class="btn-operator" onclick="appendOperator('%')">%</button>

                <!-- Numbers Row 2 -->
                <button type="button" class="btn-number" onclick="appendNumber('4')">4</button>
                <button type="button" class="btn-number" onclick="appendNumber('5')">5</button>
                <button type="button" class="btn-number" onclick="appendNumber('6')">6</button>
                <button type="button" class="btn-operator" onclick="appendOperator('*')">×</button>
                <button type="button" class="btn-science" onclick="applyFunction('factorial')">n!</button>

                <!-- Numbers Row 3 -->
                <button type="button" class="btn-number" onclick="appendNumber('1')">1</button>
                <button type="button" class="btn-number" onclick="appendNumber('2')">2</button>
                <button type="button" class="btn-number" onclick="appendNumber('3')">3</button>
                <button type="button" class="btn-operator" onclick="appendOperator('-')">−</button>
                <button type="button" class="btn-operator" onclick="appendOperator('(')">(</button>

                <!-- Numbers Row 4 -->
                <button type="button" class="btn-number" onclick="appendNumber('0')">0</button>
                <button type="button" class="btn-number" onclick="appendNumber('.')">.</button>
                <button type="button" class="btn-equals" onclick="calculate()">=</button>
                <button type="button" class="btn-operator" onclick="appendOperator('+')">+</button>
                <button type="button" class="btn-operator" onclick="appendOperator(')')">)</button>
            </div>

            <!-- Converter -->
            <div class="converter">
                <h3>🔄 Number Systems</h3>
                <div class="converter-buttons">
                    <button type="button" class="converter-btn" onclick="convertNumber('binary')">BIN</button>
                    <button type="button" class="converter-btn" onclick="convertNumber('octal')">OCT</button>
                    <button type="button" class="converter-btn" onclick="convertNumber('hex')">HEX</button>
                    <button type="button" class="converter-btn" onclick="convertNumber('decimal')">DEC</button>
                </div>
                <div class="converter-result" id="converterResult">
                    Click button to convert
                </div>
            </div>
        </div>

        <div class="history">
            <h3>📜 History</h3>
            <div id="historyList"></div>
            <button type="button" class="btn-clear-history" onclick="clearHistory()">Clear</button>
        </div>
    </div>

    <script>
        // Get display element
        const display = document.getElementById('display');
        
        // Variables
        let memoryValue = 0;
        let history = [];

        // Append number to display
        function appendNumber(num) {
            display.value += num;
        }

        // Append operator to display
        function appendOperator(op) {
            display.value += op;
        }

        // Append constant value
        function appendValue(val) {
            if (val === 'π') {
                display.value += Math.PI;
            } else if (val === 'e') {
                display.value += Math.E;
            }
        }

        // Clear display
        function clearDisplay() {
            display.value = '';
        }

        // Delete last character
        function deleteLast() {
            display.value = display.value.toString().slice(0, -1);
        }

        // Apply scientific function
        function applyFunction(func) {
            try {
                const val = parseFloat(display.value);
                
                switch(func) {
                    case 'sin':
                        display.value = Math.sin(val * Math.PI / 180);
                        break;
                    case 'cos':
                        display.value = Math.cos(val * Math.PI / 180);
                        break;
                    case 'tan':
                        display.value = Math.tan(val * Math.PI / 180);
                        break;
                    case 'log':
                        display.value = Math.log10(val);
                        break;
                    case 'sqrt':
                        display.value = Math.sqrt(val);
                        break;
                    case 'square':
                        display.value = val * val;
                        break;
                    case 'negate':
                        display.value = -val;
                        break;
                    case 'factorial':
                        let result = 1;
                        for (let i = 2; i <= val; i++) result *= i;
                        display.value = result;
                        break;
                }
            } catch (e) {
                display.value = 'Error';
            }
        }

        // Calculate result
        function calculate() {
            try {
                let expr = display.value;
                
                // Handle percentage
                expr = expr.replace(/(\d+\.?\d*)%/g, function(match, num) {
                    return num / 100;
                });
                
                // Handle power
                if (expr.includes('^')) {
                    expr = expr.replace(/(\d+\.?\d*)\^(\d+\.?\d*)/g, function(match, base, exp) {
                        return Math.pow(base, exp);
                    });
                }

                const result = eval(expr);
                
                // Add to history
                if (display.value && !isNaN(result)) {
                    addToHistory(display.value, result);
                }
                
                display.value = result;
            } catch (e) {
                display.value = 'Error';
            }
        }

        // Memory functions
        function memoryAdd() {
            try {
                const currentVal = parseFloat(display.value) || 0;
                memoryValue += currentVal;
                updateMemoryDisplay();
            } catch (e) {}
        }

        function memorySubtract() {
            try {
                const currentVal = parseFloat(display.value) || 0;
                memoryValue -= currentVal;
                updateMemoryDisplay();
            } catch (e) {}
        }

        function memoryRecall() {
            display.value = memoryValue;
        }

        function memoryClear() {
            memoryValue = 0;
            updateMemoryDisplay();
        }

        function updateMemoryDisplay() {
            const memDisplay = document.getElementById('memoryDisplay');
            if (memoryValue !== 0) {
                memDisplay.textContent = 'M: ' + memoryValue;
            } else {
                memDisplay.textContent = '';
            }
        }

        // Number conversion
        function convertNumber(type) {
            try {
                let num = parseFloat(display.value);
                if (isNaN(num)) {
                    document.getElementById('converterResult').innerHTML = 'Enter a number';
                    return;
                }
                let intNum = Math.floor(num);
                document.getElementById('converterResult').innerHTML = 
                    '<span>BIN: ' + intNum.toString(2) + '</span> ' +
                    '<span>OCT: ' + intNum.toString(8) + '</span> ' +
                    '<span>DEC: ' + intNum + '</span> ' +
                    '<span>HEX: ' + intNum.toString(16).toUpperCase() + '</span>';
            } catch (e) {
                document.getElementById('converterResult').innerHTML = 'Error';
            }
        }

        // History functions
        function addToHistory(expr, result) {
            history.unshift({ expression: expr, result: result });
            if (history.length > 10) history.pop();
            renderHistory();
        }

        function renderHistory() {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';
            
            history.forEach(function(item) {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = item.expression + ' = <span class="history-result">' + item.result + '</span>';
                div.onclick = function() {
                    display.value = item.result;
                };
                historyList.appendChild(div);
            });
        }

        function clearHistory() {
            history = [];
            renderHistory();
        }

        // Theme toggle (placeholder)
        function toggleTheme() {
            document.body.classList.toggle('light-theme');
        }

        // Keyboard support
        document.addEventListener('keydown', function(event) {
            const key = event.key;
            
            if ((key >= '0' && key <= '9') || key === '.') {
                appendNumber(key);
            } else if (key === '+' || key === '-' || key === '*' || key === '/') {
                appendOperator(key);
            } else if (key === 'Enter') {
                calculate();
            } else if (key === 'Escape') {
                clearDisplay();
            } else if (key === 'Backspace') {
                deleteLast();
            } else if (key === '(' || key === ')') {
                appendOperator(key);
            }
        });
    </script>
</body>
</html>
